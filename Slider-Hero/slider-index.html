<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Slider-Images</title>
        <link rel="stylesheet" href="slider-style.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
        />
    </head>
    <body>
        <div class="container">
            <!-- Slider main container -->
            <div class="swiper">
                <!-- Additional required wrapper -->
                <div class="swiper-wrapper">
                    <!-- Slides -->
                    <div class="swiper-slide">
                        <img
                            src="images/5-coolest-most-powerful-muscle-cars-ever-produced-by-dodge-thumbnail_4.jpg.webp"
                            alt="muscle car"
                        />
                    </div>
                    <div class="swiper-slide">
                        <img
                            src="images/7226sstbRev-67-GT500-mainbanner-2.jpg"
                            alt="GT500"
                        />
                    </div>
                    <div class="swiper-slide">
                        <img
                            src="images/Revology-67-GT500-vehiclespage.jpg"
                            alt="revolve-GT500"
                        />
                    </div>
                    <div class="swiper-slide">
                        <img
                            src="images/Shelby-25GT350-vehiclespage.jpg"
                            alt="ford-shelby"
                        />
                    </div>
                </div>
                <!-- If we need pagination -->
                <div class="swiper-pagination"></div>

                <!-- If we need navigation buttons -->
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
        <script src="slider-script.js"></script>
    </body>
</html>
